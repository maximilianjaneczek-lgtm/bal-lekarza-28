services:
  - type: web
    name: bal-lekarza-28
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: INITIAL_ADMIN_EMAIL
        value: admin@bal.local
      - key: INITIAL_ADMIN_PASSWORD
        sync: false
      - key: SEED_DEMO_USER
        value: false
      - key: SUPABASE_URL
        value: https://tojnfucurkubpyvsvtia.supabase.co/rest/v1
      - key: SUPABASE_STATE_TABLE
        value: app_state
      - key: SUPABASE_STATE_ID
        value: main
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: LOCAL_DATA_WRITES
        value: false
